<!DOCTYPE html>
<html>
<head>
  <title>Simple Image Gallery</title>

  <style>
    /*  Page Background */
    body {
      font-family: Arial;
      background-color: #222;
      color:white;
      text-align: center;
    }

    /*  Gallery Grid */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    /* Images */
    .gallery img {
      width: 200px;
      height: 150px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    /*  Hover Effect */
    .gallery img:hover {
      transform: scale(1.1);
    }

    /*  Lightbox (popup) */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      text-align: center;
    }

    .lightbox img {
      margin-top: 100px;
      width: 60%;
    }

    /*  Close Button */
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Simple Image Gallery</h2>

<!--  Images -->
<div class="gallery">
  <img src="https://picsum.photos/300/200?1" onclick="openImage(this.src)">
  <img src="https://picsum.photos/300/200?2" onclick="openImage(this.src)">
  <img src="https://picsum.photos/300/200?3" onclick="openImage(this.src)">
  <img src="https://picsum.photos/300/200?4" onclick="openImage(this.src)">
</div>

<!--  Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeImage()">✖</span>
  <img id="lightbox-img">
</div>

<script>
  // Open image in popup
  function openImage(src) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = src;
  }

  // Close popup
  function closeImage() {
    document.getElementById("lightbox").style.display = "none";
  }
</script>

</body>
</html>
